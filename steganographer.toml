# ═══════════════════════════════════════════════════════════════════════════════
# Steganographer — Master Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# Full-featured configuration for all steganographic functions.
# Place this file in the project root and reference it with:
#   steganographer --config steganographer.toml <command>
#
# All options documented inline. Uncomment to activate.
# ═══════════════════════════════════════════════════════════════════════════════

[global]
# Logging verbosity: "trace" | "debug" | "info" | "warn" | "error"
log_level = "info"
# Hash algorithm for frame data: "blake3" (default), "sha256", "sha3-256"
# hash_algorithm = "blake3"
# Path to a file containing the LSB embedding key (hex, 64 chars = 32 bytes).
# Overrides the inline `key` field in [video.stego.lsb_signature] and [audio.stego.lsb_signature].
# key_file = "keys/stego.key"

# ─── Video Pipeline ───────────────────────────────────────────────────────────
#
# Real-time video capture → steganographic embedding → output.
# Supports V4L2 (Linux), AVFoundation (macOS), file I/O, and test sources.

[video]

# ─── Video Pipeline Settings ──────────────────────────────────────────────────

[video.pipeline]
width = 640
height = 480
framerate = 30
# Overlay opacity / steganographic intensity (0.0 – 1.0).
opacity = 1.0

[video.pipeline.payload]
# Payload type embedded per frame: "signature" (default) | "custom"
type = "signature"
# Payload size in bytes. Default: 109 (4 magic + 1 version + 8 frame_index + 32 hash + 64 signature)
size = 109
# Signing backend: "ed25519" (default, BLAKE3+Ed25519) | "ethereum" (Keccak-256+secp256k1 EIP-191)
signing_backend = "ed25519"
# Enable payload encryption (ChaCha20-Poly1305 AEAD).
# encrypt = true
# Encryption key (hex-encoded 32 bytes = 64 hex chars).
# encryption_key = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
# Path to encryption key file (overrides encryption_key).
# encryption_key_file = "keys/encryption.key"
# Error correction: "none" (default) | "reed_solomon"
# error_correction = "reed_solomon"
# Multi-frame signature spreading: spread one signature across N frames (1 = no spreading).
# multi_frame_spread = 1

[video.input]
type = "device"
# backend = "v4l2"
# device = "/dev/video0"
# backend = "avfoundation"
# device = "FaceTime HD Camera"
# type = "file"
# path = "input_video.raw"

[video.output]
type = "device"
# backend = "v4l2loopback"
# device = "/dev/video42"
# type = "file"
# path = "output_video.raw"

[video.stego]
# Ordered list of stego modules applied per frame.
# Available: "lsb_signature", "overlay", "info_bar"
# Order matters: LSB embeds first, overlay/info_bar render on top.
pipeline = ["lsb_signature", "overlay", "info_bar"]

[video.stego.lsb_signature]
# Number of least-significant bits to use per pixel byte (1–4).
bits = 1
# 32-byte hex-encoded key (64 hex characters).
# Used for PRNG index permutation in audio; included for config consistency.
# Generate with: steganographer keygen --output mykey
key = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
# Alternatively, load key from file (overrides `key`):
# key_file = "keys/stego.key"

[video.stego.overlay]
# Visible text watermark burned into the video frame.
# Supports {timestamp}, {frame_index}, {date}, {time} placeholders.
text = "CONFIDENTIAL {timestamp}"
position = "bottom-right"
font_size = 16

[video.stego.info_bar]
# Exoteric information bar with timestamp, barcode, and QR code.
label = "STEGANOGRAPHER"
show_barcode = true
show_qr = true
show_timestamp = true

# ─── Audio Pipeline ───────────────────────────────────────────────────────────

[audio]

[audio.input]
type = "device"
# backend = "pulseaudio"
# backend = "pipewire"
# backend = "coreaudio"
# type = "file"
# path = "input_audio.raw"

[audio.output]
type = "device"
# backend = "pulseaudio"
# type = "file"
# path = "output_audio.raw"

[audio.stego]
pipeline = ["lsb_signature"]

[audio.stego.lsb_signature]
# Number of LSBs per 16-bit audio sample (1–4).
bits = 1
# 32-byte hex-encoded key for pseudo-random sample index permutation.
# Each frame uses: seed = key XOR frame_index → ChaCha8 PRNG → Fisher-Yates shuffle.
key = "abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"
# Alternatively, load key from file:
# key_file = "keys/audio_stego.key"
