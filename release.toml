[cargo-release]
# Configure cargo-release for the steganographer workspace.
# Install: cargo install cargo-release
# Usage: cargo release <version> --execute

# Consistent release flow
consolidate-commits = true
push-remote = "origin"
tag-prefix = "v"
pre-release-replacements = [
    {file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [{{version}}] — {{date}}" },
    {file = "CHANGELOG.md", search = "\\[Unreleased\\]:", replace = "[Unreleased]: https://github.com/docxology/steganographer/compare/v{{version}}...HEAD\n[{{version}}]: https://github.com/docxology/steganographer/releases/tag/v{{version}}" },
]

# Don't publish to crates.io yet (GStreamer dependency)
publish = false
# Don't push to crates.io registry
registry = false
