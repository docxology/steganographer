# cargo-deny configuration
# Run: cargo deny check

[advisories]
# Deny advisories with severity >= medium (matches the policy comment)
# The `deny` list causes cargo-deny to fail (exit non-zero) on these.
version-scope = "*"
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Deny unmaintained crates and medium+ severity advisories
unmaintained = "workspace"
# Deny any advisory with severity medium or higher
deny = ["medium", "high", "critical"]
# Warn on low-severity advisories
warn = ["low"]

[licenses]
# Allow only MIT and Apache-2.0 licensed dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
# Deny licenses not in the allow list
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0"]
# Confidence threshold for license detection
confidence-threshold = 0.8

[bans]
# Warn about multiple versions of the same crate
multiple-versions = "warn"
# Allow wildcard for workspace deps
wildcards = "allow"

[sources]
# Only allow crates.io as a source
allow-registry = ["https://github.com/rustsec/advisory-db"]
# Deny git dependencies (require published crates)
deny-git = false
