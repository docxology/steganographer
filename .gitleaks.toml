# Gitleaks secret-scanning configuration
# https://github.com/gitleaks/gitleaks

title = "Steganographer Secret Scan"

[allowlist]
description = "Allowlisted paths and patterns — example/fixture/test keys only"
paths = [
  '''Cargo\.lock''',
  '''\.github/workflows/.*''',
  '''config/example\.toml''',
  '''docs/.*''',
  '''steganographer\.toml''',
  '''CHANGELOG\.md''',
  '''\.gitleaks\.toml''',
  '''steganographer-core/src/config\.rs''',
  '''steganographer-core/tests/.*''',
]
# Allow the well-known example/fixture/test key patterns
regexes = [
  '''0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef''',
  '''abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789''',
  '''aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa''',
  '''bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb''',
]

[[rules]]
id = "ed25519-private-key"
description = "Ed25519 private key (64-byte hex)"
regex = '''[0-9a-fA-F]{128}'''
tags = ["key", "ed25519"]

[[rules]]
id = "hex-secret-32bytes"
description = "32-byte hex secret (potential signing/encryption key)"
regex = '''(?i)(key|secret|token|password)\s*[:=]\s*["']?[0-9a-fA-F]{64}["']?'''
tags = ["key", "secret"]
